#  ╔─────────────────────────────────────────────────────────────────────────────╗
#  ║  🏃 Runway — AI Usage Tracker                                               ║
#  ║  📦 Docker Compose Configuration                                            ║
#  ╚─────────────────────────────────────────────────────────────────────────────╝
#
#  Quick Start:
#    1. Copy .env.example to .env and configure your API keys
#    2. docker compose pull && docker compose up -d
#    3. Access dashboard at http://localhost:8765
#
#  Pinning: change `:latest` to a specific version (e.g. `:1.0.0`). Available
#  tags: https://github.com/s3ntin3l8/runway/pkgs/container/runway
#
#  Build from source instead of pulling: uncomment the `build:` block below
#  and run `docker compose up -d --build`.
#
#  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:
  runway:
    image: ghcr.io/s3ntin3l8/runway:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: runway
    ports:
      - "8765:8765"
    env_file:
      - .env
    volumes:
      # Persist application data (database, configs)
      - ./data:/home/runway/.config/runway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
