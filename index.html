<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runway — AI Subscription Limits</title>
    <meta name="description" content="Live dashboard tracking remaining AI subscription limits and reset timers across all your developer tools.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
        body { background-color: #09090b; color: #fafafa; }
        code, .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

        .glass-panel {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(63, 63, 70, 0.6);
            transition: border-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
        }
        .glass-panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        /* Health states */
        .health-good    { border-color: rgba(34,197,94,0.35); }
        .health-good:hover { border-color: rgba(34,197,94,0.7); box-shadow: 0 12px 40px rgba(34,197,94,0.08); }
        .health-warning { border-color: rgba(251,191,36,0.35); }
        .health-warning:hover { border-color: rgba(251,191,36,0.7); box-shadow: 0 12px 40px rgba(251,191,36,0.08); }
        .health-critical { border-color: rgba(239,68,68,0.5); }
        .health-critical:hover { border-color: rgba(239,68,68,0.8); box-shadow: 0 12px 40px rgba(239,68,68,0.12); }
        .health-unknown { border-color: rgba(63,63,70,0.6); }

        /* Status dot */
        .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .dot-good     { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.8); }
        .dot-warning  { background: #fbbf24; box-shadow: 0 0 8px rgba(251,191,36,0.8); }
        .dot-critical { background: #ef4444; box-shadow: 0 0 12px rgba(239,68,68,0.9); animation: pulse-dot 1.5s ease-in-out infinite; }
        .dot-unknown  { background: #52525b; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(239,68,68,0.9); }
            50%       { opacity: 0.5; box-shadow: 0 0 4px rgba(239,68,68,0.4); }
        }

        /* Progress bar */
        .progress-track { height: 3px; background: rgba(63,63,70,0.5); border-radius: 2px; overflow: hidden; }
        .progress-fill  { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

        /* Skeleton loader */
        .skeleton { background: linear-gradient(90deg, rgba(39,39,42,0.8) 25%, rgba(63,63,70,0.5) 50%, rgba(39,39,42,0.8) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }

        /* Compact Mode & Inverted */
        .compact-mode #grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .compact-mode .glass-panel { padding: 1rem; }
        .compact-mode .text-4xl { font-size: 1.875rem; line-height: 2.25rem; }
        .compact-mode .progress-track { margin-top: 0.5rem; height: 2px; }
        .compact-mode .pt-3 { padding-top: 0.5rem; }
        
        .toggle-btn {
            background: #18181b;
            border: 1px solid #3f3f46;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #71717a;
            letter-spacing: 0.025em;
        }
        .toggle-btn.active {
            border-color: #3b82f6;
            color: #eff6ff;
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Background gradient -->
    <div class="fixed inset-0 pointer-events-none" style="background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(59,130,246,0.06) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 80% 80%, rgba(139,92,246,0.04) 0%, transparent 60%);"></div>

    <div class="relative max-w-7xl mx-auto px-6 py-10 md:px-12 md:py-14">

        <!-- Header -->
        <header class="mb-12 flex flex-col sm:flex-row sm:items-end justify-between gap-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-2 h-8 rounded-full bg-gradient-to-b from-blue-400 to-violet-500"></div>
                    <h1 class="text-3xl font-black tracking-tight text-zinc-50">Runway</h1>
                </div>
                <p class="text-zinc-500 text-sm uppercase tracking-widest font-medium ml-5">Live AI Subscription Limits</p>
            </div>

            <div class="flex flex-col items-end gap-3 ml-5 sm:ml-0">
                <div class="flex items-center gap-2">
                    <button id="toggle-compact" class="toggle-btn" onclick="toggleConfig('compact')">COMPACT</button>
                    <button id="toggle-remaining" class="toggle-btn" onclick="toggleConfig('remaining')">REMAINING %</button>
                    <span id="last-updated" class="text-[10px] text-zinc-600 mono ml-2 hidden"></span>
                </div>
                <button id="refresh-btn" onclick="loadData()" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-zinc-500 text-zinc-200 px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 shadow-sm active:scale-95">
                    <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                    Sync Limits
                </button>
            </div>
        </header>

        <!-- Loading skeletons -->
        <div id="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 hidden">
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
        </div>

        <!-- Error banner -->
        <div id="error-banner" class="hidden p-4 bg-red-950/40 border border-red-800/50 text-red-400 rounded-xl mono text-sm mb-6">
            > Connection refused. Make sure <strong class="text-red-300">uvicorn main:app</strong> is running.
        </div>

        <!-- Grid -->
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

        <!-- Footer -->
        <footer class="mt-14 text-center text-xs text-zinc-700 mono">
            runway · local-first · stateless · <span id="footer-count">0</span> sources
        </footer>
    </div>

    <script>
        const HEALTH_CONFIG = {
            good:     { dot: 'dot-good',     card: 'health-good',     badge: 'text-emerald-400', bar: '#22c55e', label: 'GOOD' },
            warning:  { dot: 'dot-warning',  card: 'health-warning',  badge: 'text-amber-400',   bar: '#f59e0b', label: 'WARN' },
            critical: { dot: 'dot-critical', card: 'health-critical', badge: 'text-red-400',      bar: '#ef4444', label: 'CRIT' },
            unknown:  { dot: 'dot-unknown',  card: 'health-unknown',  badge: 'text-zinc-500',     bar: '#3f3f46', label: '——' },
        };

        const STATE = {
            compact: false,
            remaining: false,
            data: []
        };

        function toggleConfig(key) {
            STATE[key] = !STATE[key];
            document.getElementById(`toggle-${key}`).classList.toggle('active', STATE[key]);
            if (key === 'compact') {
                document.body.classList.toggle('compact-mode', STATE[key]);
            }
            renderGrid();
        }

        function parseProgressPct(detail) {
            // Matches (81%), 81.0%, 0%, etc.
            const m = detail.match(/(\d+(\.\d+)?)%/);
            return m ? Math.min(100, parseFloat(m[1])) : null;
        }

        function buildCard(item) {
            const h = HEALTH_CONFIG[item.health] || HEALTH_CONFIG.unknown;
            const usedPct = parseProgressPct(item.detail || '');
            
            // Inverted Logic
            let barWidth = usedPct;
            if (STATE.remaining && usedPct !== null) {
                barWidth = 100 - usedPct;
            }

            const isPlaceholder = item.health === 'unknown';

            const progressBar = barWidth !== null ? `
                <div class="progress-track mt-4">
                    <div class="progress-fill" style="width: ${barWidth}%; background: ${h.bar};"></div>
                </div>` : '';

            const detailEl = item.detail ? `
                <p class="text-xs text-zinc-600 mono mt-1 truncate" title="${item.detail}">${item.detail}</p>` : '';

            const paceBadge = item.pace ? `
                <span class="text-[10px] font-bold text-zinc-500 bg-zinc-900/80 border border-zinc-800 px-1.5 py-0.5 rounded-full mono">${item.pace}</span>
            ` : '';

            return `
                <div class="glass-panel ${h.card} rounded-2xl p-5 relative flex flex-col gap-3">
                    <!-- Header row -->
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex items-center gap-2 min-w-0">
                            <span class="text-xl leading-none">${item.icon}</span>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-semibold text-zinc-400 uppercase tracking-wide truncate">${item.service}</span>
                                ${paceBadge}
                            </div>
                        </div>
                        <div class="flex items-center gap-1.5 shrink-0">
                            <div class="dot ${h.dot}"></div>
                            <span class="text-xs font-bold ${h.badge} mono">${h.label}</span>
                        </div>
                    </div>

                    ${progressBar}

                    <!-- Main value -->
                    <div class="mt-1">
                        <div class="flex items-baseline gap-1.5 flex-wrap">
                            <span class="text-4xl font-black tracking-tighter ${isPlaceholder ? 'text-zinc-600' : 'text-zinc-50'}">${item.remaining}</span>
                            <span class="text-sm font-medium text-zinc-500">${item.unit}</span>
                        </div>
                        ${detailEl}
                    </div>

                    <!-- Reset footer -->
                    <div class="mt-auto pt-3 border-t border-zinc-800/60 flex items-center justify-between">
                        <span class="text-xs text-zinc-600 mono font-medium">RESETS</span>
                        <span class="text-xs font-semibold text-zinc-400 bg-zinc-800/60 px-2 py-1 rounded-md mono">
                            ${item.reset}
                        </span>
                    </div>
                </div>
            `;
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            let html = '';
            let count = 0;
            
            STATE.data.forEach(item => {
                try {
                    html += buildCard(item);
                    count++;
                } catch (e) {
                    console.error("Failed to render card for:", item, e);
                }
            });
            
            grid.innerHTML = html;
            document.getElementById('footer-count').textContent = count;
        }

        async function loadData() {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            const errorBanner = document.getElementById('error-banner');
            const refreshBtn = document.getElementById('refresh-btn');
            const refreshIcon = document.getElementById('refresh-icon');
            const lastUpdated = document.getElementById('last-updated');

            grid.innerHTML = '';
            grid.classList.add('hidden');
            loading.classList.remove('hidden');
            errorBanner.classList.add('hidden');
            refreshBtn.disabled = true;
            refreshIcon.style.animation = 'spin 1s linear infinite';
            refreshIcon.style.transformOrigin = 'center';

            try {
                const resp = await fetch('/api/limits');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const json = await resp.json();

                STATE.data = json.limits;
                renderGrid();

                const now = new Date();
                lastUpdated.textContent = `Updated ${now.toLocaleTimeString()}`;
                lastUpdated.classList.remove('hidden');

            } catch (err) {
                errorBanner.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
                refreshBtn.disabled = false;
                refreshIcon.style.animation = '';
            }
        }

        // Add spin keyframes dynamically
        const style = document.createElement('style');
        style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
        document.head.appendChild(style);

        // Auto-load on startup
        loadData();
    </script>
</body>
</html>
